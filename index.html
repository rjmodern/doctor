<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khaja Badruddoja Modern Hospital | Elite Portal</title>
    
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Hind+Siliguri:wght@300;400;600;700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-deep: #0a0a0a;
            --gold: #d4af37;
            --gold-light: #f1d279;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(212, 175, 55, 0.2);
            --text-gold: #e5c07b;
            --text-dim: #a0a0a0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg-deep);
            color: #ffffff;
            font-family: 'Hind Siliguri', sans-serif;
            overflow: hidden; /* Header-Footer ফিক্সড রাখার জন্য */
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Fixed Header --- */
        header {
            position: fixed;
            top: 0; width: 100%;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 20px;
            text-align: center;
            z-index: 2000;
        }
        header h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: clamp(18px, 4vw, 32px);
            letter-spacing: 1px;
        }
        .header-contact {
            font-size: 13px;
            color: var(--text-dim);
            margin-top: 5px;
            letter-spacing: 2px;
        }
        .header-contact b { color: var(--gold-light); }

        /* --- Sticky Navigation (Header এর নিচে) --- */
        nav {
            position: fixed;
            top: 85px; width: 100%;
            background: rgba(10, 10, 10, 0.8);
            display: flex;
            justify-content: center;
            gap: 5px;
            padding: 10px;
            z-index: 1900;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        nav a {
            color: var(--text-dim);
            text-decoration: none;
            padding: 8px 15px;
            font-size: 13px;
            border-radius: 4px;
            transition: 0.3s;
            cursor: pointer;
            border: 1px solid transparent;
        }
        nav a.active-link {
            color: var(--gold);
            border-color: var(--glass-border);
            background: var(--glass);
        }

        /* --- Scrollable Content Area --- */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 160px 20px 80px 20px; /* Header ও Footer এর জায়গা রাখা হয়েছে */
            scrollbar-width: thin;
            scrollbar-color: var(--gold) var(--bg-deep);
        }
        main::-webkit-scrollbar { width: 5px; }
        main::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        .container { max-width: 1100px; margin: 0 auto; }

        section { display: none; animation: fadeIn 0.6s ease; }
        section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Luxury Card Styling --- */
        .search-box {
            width: 100%;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 12px;
            color: #fff;
            font-size: 18px;
            outline: none;
            text-align: center;
            margin-bottom: 40px;
            transition: 0.4s;
        }
        .search-box:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }

        .filter-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        select {
            background: #151515;
            border: 1px solid var(--glass-border);
            padding: 12px;
            color: var(--gold-light);
            border-radius: 8px;
            outline: none;
        }

        .doctor-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .doc-card {
            background: linear-gradient(145deg, #121212, #080808);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            transition: 0.4s;
            position: relative;
        }
        .doc-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .doc-card h3 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 24px; margin-bottom: 8px; }
        .doc-spec { color: var(--text-dim); font-size: 14px; margin-bottom: 20px; display: block; font-weight: 300; }
        
        .meta-box { border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; }
        .tag { font-size: 11px; text-transform: uppercase; color: var(--text-gold); border: 1px solid var(--glass-border); padding: 3px 10px; border-radius: 4px; margin-right: 5px; }
        
        .schedule-row { 
            display: flex; justify-content: space-between; 
            margin-top: 12px; font-size: 13px; 
            background: rgba(255,255,255,0.02); padding: 8px 12px; border-radius: 6px;
        }

        /* --- Fixed Footer --- */
        footer {
            position: fixed;
            bottom: 0; width: 100%;
            background: rgba(10, 10, 10, 0.95);
            border-top: 1px solid var(--glass-border);
            padding: 15px;
            text-align: center;
            z-index: 2000;
        }
        footer p { font-size: 12px; color: var(--text-dim); letter-spacing: 1px; }
        footer span { color: var(--gold); font-weight: 600; }

        /* --- Table Styling --- */
        .table-wrap { border-radius: 12px; overflow: hidden; border: 1px solid var(--glass-border); }
        table { width: 100%; border-collapse: collapse; background: var(--glass); }
        th { background: rgba(212, 175, 55, 0.1); color: var(--gold); padding: 15px; text-align: left; font-size: 14px; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }

        @media (max-width: 600px) {
            nav { top: 75px; flex-wrap: wrap; }
            main { padding-top: 190px; }
        }
    </style>
</head>

            <div id="searchResults" class="doctor-grid"></div>
        </section>

        <!-- Day View Section -->
        <section id="day-view">
            <div class="filter-row">
                <select id="daySelect" onchange="filterDay()">
                    <option value="">দিন নির্বাচন করুন</option>

            </div>
            <div id="dayResults" class="doctor-grid"></div>
        </section>

            </div>
            <div class="table-wrap" id="feeResults"></div>
        </section>

        <!-- Directory Section -->
        <section id="full-view">
            <div class="filter-row">
                <select id="deptSelectFull" onchange="updateDocList()"><option value="">বিভাগ সিলেক্ট করুন</option></select>

            </div>
            <div id="fullResults"></div>
        </section>
    </div>
</main>

    const depts = [...new Set(doctors.map(d => d.dept))];

    window.onload = () => {
        ['deptSelectDay', 'deptSelectFee', 'deptSelectFull'].forEach(sId => {
            const el = document.getElementById(sId);
            depts.forEach(d => el.innerHTML += `<option value="${d}">${d}</option>`);
        });
    };

    function showSection(id, btn) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('nav a').forEach(a => a.classList.remove('active-link'));
        btn.classList.add('active-link');
    }

    function createDocCard(doc, dayFilter = null) {
        let scheds = dayFilter ? doc.schedules.filter(s => s.day === dayFilter) : doc.schedules;
        return `
            <div class="doc-card">
                <span class="tag">${doc.dept}</span>
                <h3>${doc.name}</h3>
                <span class="doc-spec">${doc.spec}</span>
                <div class="meta-box">
                    <span class="tag">ফি: ${doc.fee1}/-</span>
                    ${scheds.map(s => `
                        <div class="schedule-row">
                            <span style="color:var(--gold-light)">${s.day}</span>
                            <span>${s.time} (রুম ${s.room})</span>
                        </div>
                    `).join('')}
                </div>
            </div>`;
    }

    function searchDoctors() {
        const query = document.getElementById('mainSearch').value.toLowerCase();
        const results = document.getElementById('searchResults');
        if(query.length < 2) { results.innerHTML = ""; return; }
        const filtered = doctors.filter(d => d.name.toLowerCase().includes(query) || d.dept.toLowerCase().includes(query) || d.spec.toLowerCase().includes(query));
        results.innerHTML = filtered.map(d => createDocCard(d)).join('');
    }

    function filterDay() {
        const day = document.getElementById('daySelect').value;
        const dept = document.getElementById('deptSelectDay').value;
        const res = document.getElementById('dayResults');
        if(!day || !dept) return;
        const filtered = doctors.filter(d => d.dept === dept && d.schedules.some(s => s.day === day));
        res.innerHTML = filtered.map(d => createDocCard(d, day)).join('');
    }

    function filterFees() {
        const dept = document.getElementById('deptSelectFee').value;
        const res = document.getElementById('feeResults');
        if(!dept) return;
        let html = `<table><thead><tr><th>ডাক্তার</th><th>ভিজিট (১ম)</th><th>ভিজিট (২য়)</th></tr></thead><tbody>`;
        doctors.filter(d => d.dept === dept).forEach(d => {
            html += `<tr><td><b>${d.name}</b><br><small style="color:var(--text-dim)">${d.spec}</small></td><td>${d.fee1}/-</td><td>${d.fee2 || 'N/A'}</td></tr>`;
        });
        res.innerHTML = html + `</tbody></table>`;
    }

    function updateDocList() {
        const dept = document.getElementById('deptSelectFull').value;
        const docSelect = document.getElementById('doctorSelect');
        docSelect.innerHTML = '<option value="">ডাক্তার সিলেক্ট করুন</option>';
        doctors.filter(d => d.dept === dept).forEach(d => {
            docSelect.innerHTML += `<option value="${d.name}">${d.name}</option>`;
        });
    }

    function showFullSchedule() {
        const name = document.getElementById('doctorSelect').value;
        const res = document.getElementById('fullResults');
        const doc = doctors.find(d => d.name === name);
        res.innerHTML = `<div style="max-width:400px; margin:0 auto;">${createDocCard(doc)}</div>`;
    }
