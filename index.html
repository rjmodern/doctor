<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>খাজা বদরুদদোজা মডার্ন হাসপাতাল - ডিজিটাল শিডিউল</title>
    
    <!-- ফন্ট এবং আইকন -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1><i class="fa-solid fa-hospital-user"></i> খাজা বদরুদদোজা মডার্ন হাসপাতাল</h1>
    <p>সফিপুর, কালিয়াকৈর, গাজীপুর</p>
    <div class="contact-info">
        <a href="tel:01776606262"><i class="fa-solid fa-phone"></i> ০১৭৭৬-৬০৬২৬২</a>
        <a href="tel:01687625565"><i class="fa-solid fa-phone"></i> ০১৬৮৭৬২৫৫৬৫</a>
    </div>
</header>

<nav id="navbar">
    <a onclick="showSection('home', this)" class="active-link"><i class="fa-solid fa-magnifying-glass"></i> খুঁজুন</a>
    <a onclick="showSection('day-view', this)"><i class="fa-solid fa-calendar-day"></i> আজকের শিডিউল</a>
    <a onclick="showSection('fee-view', this)"><i class="fa-solid fa-tags"></i> ভিজিট ফি</a>
    <a onclick="showSection('full-view', this)"><i class="fa-solid fa-clipboard-list"></i> পূর্ণাঙ্গ রুটিন</a>
</nav>

<div class="container">
    <!-- সার্চ সেকশন -->
    <section id="home" class="active">
        <div class="search-container">
            <input type="text" id="mainSearch" class="search-box" placeholder="ডাক্তারের নাম বা বিভাগ লিখে সার্চ করুন..." onkeyup="searchDoctors()">
            <i class="fa-solid fa-search search-icon"></i>
        </div>
        <div id="searchResults"></div>
    </section>

    <!-- আজকের শিডিউল -->
    <section id="day-view">
        <div class="filter-grid">
            <select id="daySelect" onchange="filterDay()">
                <option value="">দিন সিলেক্ট করুন</option>
                <option value="শনিবার">শনিবার</option>
                <option value="রবিবার">রবিবার</option>
                <option value="সোমবার">সোমবার</option>
                <option value="মঙ্গলবার">মঙ্গলবার</option>
                <option value="বুধবার">বুধবার</option>
                <option value="বৃহস্পতিবার">বৃহস্পতিবার</option>
                <option value="শুক্রবার">শুক্রবার</option>
            </select>
            <select id="deptSelectDay" onchange="filterDay()"><option value="">সকল বিভাগ</option></select>
        </div>
        <div id="dayResults"></div>
    </section>

    <!-- ভিজিট ফি -->
    <section id="fee-view">
        <select id="deptSelectFee" onchange="filterFees()"><option value="">বিভাগ সিলেক্ট করুন</option></select>
        <div class="table-responsive" id="feeResults"></div>
    </section>

    <!-- পূর্ণাঙ্গ রুটিন -->
    <section id="full-view">
        <div class="filter-grid">
            <select id="deptSelectFull" onchange="updateDocList()"><option value="">বিভাগ সিলেক্ট করুন</option></select>
            <select id="doctorSelect" onchange="showFullSchedule()"><option value="">ডাক্তার সিলেক্ট করুন</option></select>
        </div>
        <div id="fullResults"></div>
    </section>
</div>

<div class="footer">
    <p>&copy; ২০২৪ খাজা বদরুদদোজা মডার্ন হাসপাতাল। সফিপুর, কালিয়াকৈর, গাজীপুর।</p>
</div>

<!-- জাভাস্ক্রিপ্ট ফাইল কানেকশন -->
<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
