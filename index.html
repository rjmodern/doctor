<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Schedule - Khaja Badruddoja Modern Hospital</title>
    
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-dark: #062c26; /* Deep Emerald */
            --gold: #d4af37;        /* Metallic Gold */
            --gold-light: #f1d279;
            --text-light: #e2e8f0;
            --accent: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(212, 175, 55, 0.3);
        }

        * { box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        
        body { 
            margin: 0; 
            background: radial-gradient(circle at top, #0a3d34, #051a17); 
            color: var(--text-light); 
            line-height: 1.6;
            min-height: 100vh;
        }

        /* --- Luxury Header --- */
        header {
            background: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent);
            padding: 60px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        header h1 { 
            margin: 0; 
            font-family: 'Playfair Display', serif;
            font-size: 38px; 
            color: var(--gold);
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        header p { font-weight: 300; opacity: 0.8; letter-spacing: 2px; text-transform: uppercase; font-size: 14px; margin-top: 10px; }

        .contact-info { margin-top: 25px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .contact-info a { 
            color: var(--gold); 
            text-decoration: none; 
            border: 1px solid var(--border); 
            padding: 8px 20px; 
            border-radius: 4px; 
            font-size: 14px; 
            transition: 0.4s;
            background: var(--glass);
            backdrop-filter: blur(5px);
        }
        .contact-info a:hover { background: var(--gold); color: var(--primary-dark); }

        /* --- Premium Navigation --- */
        nav {
            background: rgba(6, 44, 38, 0.8);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
            padding: 0 10px;
        }
        nav a {
            color: var(--text-light);
            padding: 20px 25px;
            text-decoration: none;
            font-weight: 400;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
            cursor: pointer;
        }
        nav a:hover { color: var(--gold); }
        nav a.active-link { 
            color: var(--gold); 
            font-weight: 700;
            border-bottom: 2px solid var(--gold);
        }

        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; min-height: 60vh; }
        
        section { display: none; animation: slideUp 0.6s ease-out; }
        section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Luxury Inputs --- */
        .search-container { margin-bottom: 40px; }
        .search-box {
            width: 100%;
            padding: 18px 30px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: var(--glass);
            color: white;
            font-size: 18px;
            outline: none;
            transition: 0.3s;
            text-align: center;
        }
        .search-box:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        select {
            width: 100%;
            padding: 12px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: #062c26;
            color: var(--gold);
            cursor: pointer;
            outline: none;
        }

        /* --- Doctor Card: The Luxury Look --- */
        .doctor-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 25px;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        .doctor-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 4px; height: 100%;
            background: var(--gold);
        }
        .doctor-card:hover { 
            transform: translateY(-5px); 
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .doc-name { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--gold); margin: 0 0 5px 0; }
        .doc-spec { color: #a0aec0; font-weight: 300; display: block; margin-bottom: 15px; font-style: italic; }
        
        .badge {
            background: rgba(212, 175, 55, 0.1);
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 12px;
            color: var(--gold-light);
            border: 1px solid rgba(212, 175, 55, 0.2);
            margin-right: 10px;
        }
        .badge-fee { background: rgba(255, 255, 255, 0.1); color: #fff; }

        .schedule-table {
            margin-top: 20px;
            border-top: 1px solid var(--border);
            padding-top: 15px;
        }
        .schedule-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .schedule-row strong { color: var(--gold); }

        /* --- Premium Table --- */
        .table-responsive { border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); }
        th { background: var(--gold); color: var(--primary-dark); padding: 15px; text-align: left; text-transform: uppercase; font-size: 13px; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        tr:hover { background: rgba(212, 175, 55, 0.05); }

        /* --- Footer --- */
        .footer { 
            background: #031311; 
            color: var(--gold); 
            text-align: center; 
            padding: 60px 20px; 
            margin-top: 80px; 
            border-top: 1px solid var(--border);
        }
        .footer p { margin: 5px; font-weight: 300; }
        
        .no-data { text-align: center; padding: 40px; color: var(--gold); opacity: 0.6; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--primary-dark); }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        @media (max-width: 600px) {
            header h1 { font-size: 26px; }
            nav a { padding: 15px 10px; font-size: 11px; }
            .doctor-card { padding: 20px; }
        }
    </style>
</head>

        </div>
        <div id="fullResults"></div>
    </section>

</div>

    // অটো ডিপার্টমেন্ট লিস্ট
    const depts = [...new Set(doctors.map(d => d.dept))];

    window.onload = () => {
        const selectors = ['deptSelectDay', 'deptSelectFee', 'deptSelectFull'];
        selectors.forEach(sId => {
            const el = document.getElementById(sId);
            depts.forEach(d => el.innerHTML += `<option value="${d}">${d}</option>`);
        });
    };

    function showSection(id, btn) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('nav a').forEach(a => a.classList.remove('active-link'));
        btn.classList.add('active-link');
    }

    // প্রিমিয়াম কার্ড ডিজাইন
    function createCard(doc, highlightDay = null) {
        let scheduleHtml = "";
        if(!highlightDay) {
            scheduleHtml = doc.schedules.map(s => `
                <div class="schedule-row">
                    <span><strong>${s.day}</strong></span>
                    <span>${s.time} <span style="color:var(--gold-light); opacity:0.6">(রুম: ${s.room})</span></span>
                </div>
            `).join('');
        } else {
            const s = doc.schedules.find(sc => sc.day === highlightDay);
            scheduleHtml = `<div class="schedule-row"><strong>${s.day}:</strong> ${s.time} (রুম: ${s.room})</div>`;
        }

        return `
            <div class="doctor-card">
                <h3 class="doc-name">${doc.name}</h3>
                <span class="doc-spec">${doc.spec}</span>
                <div class="card-meta">
                    <span class="badge"><i class="fa-solid fa-microscope"></i> ${doc.dept}</span>
                    <span class="badge badge-fee"><i class="fa-solid fa-crown"></i> ফি: ${doc.fee1}/-</span>
                </div>
                <div class="schedule-table">
                    ${scheduleHtml}
                </div>
            </div>`;
    }

    function searchDoctors() {
        const query = document.getElementById('mainSearch').value.toLowerCase();
        const results = document.getElementById('searchResults');
        if(query.length < 2) { results.innerHTML = '<div class="no-data">কমপক্ষে ২ টি অক্ষর টাইপ করুন...</div>'; return; }

        const filtered = doctors.filter(d => 
            d.name.toLowerCase().includes(query) || 
            d.spec.toLowerCase().includes(query) ||
            d.dept.toLowerCase().includes(query)
        );

        results.innerHTML = filtered.length ? filtered.map(d => createCard(d)).join('') : '<div class="no-data">দুঃখিত, কোনো এলিট রেকর্ড পাওয়া যায়নি।</div>';
    }

    function filterDay() {
        const day = document.getElementById('daySelect').value;
        const dept = document.getElementById('deptSelectDay').value;
        const res = document.getElementById('dayResults');
        if(!day || !dept) return;

        const filtered = doctors.filter(d => d.dept === dept && d.schedules.some(s => s.day === day));
        res.innerHTML = filtered.length ? filtered.map(d => createCard(d, day)).join('') : '<div class="no-data">এই নির্ধারিত দিনে কোনো শিডিউল নেই।</div>';
    }

    function filterFees() {
        const dept = document.getElementById('deptSelectFee').value;
        const res = document.getElementById('feeResults');
        if(!dept) return;

        let html = `<table><thead><tr><th>ডাক্তার</th><th>রুম</th><th>ফি (১ম)</th><th>ফি (২য়)</th></tr></thead><tbody>`;
        doctors.filter(d => d.dept === dept).forEach(d => {
            html += `<tr>
                <td><strong style="color:var(--gold)">${d.name}</strong><br><small style="opacity:0.7">${d.spec}</small></td>
                <td>${d.schedules[0].room}</td>
                <td>${d.fee1}/-</td>
                <td>${d.fee2 ? d.fee2+'/-' : 'N/A'}</td>
            </tr>`;
        });
        res.innerHTML = html + `</tbody></table>`;
    }

    function updateDocList() {
        const dept = document.getElementById('deptSelectFull').value;
        const docSelect = document.getElementById('doctorSelect');
        docSelect.innerHTML = '<option value="">ডাক্তার সিলেক্ট করুন</option>';
        doctors.filter(d => d.dept === dept).forEach(d => {
            docSelect.innerHTML += `<option value="${d.name}">${d.name}</option>`;
        });
    }

    function showFullSchedule() {
        const name = document.getElementById('doctorSelect').value;
        const res = document.getElementById('fullResults');
        if(!name) return;
        const doc = doctors.find(d => d.name === name);
        res.innerHTML = createCard(doc);
    }
</script>
